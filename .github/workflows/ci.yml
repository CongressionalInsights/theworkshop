name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      THEWORKSHOP_NO_OPEN: "1"
      THEWORKSHOP_NO_MONITOR: "1"
      THEWORKSHOP_NO_KEYCHAIN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip uv

      - name: Python syntax check
        run: |
          python -m compileall -q scripts

      - name: Core regression suite
        run: |
          set -euo pipefail
          tests=(
            scripts/transition_done_guard_test.py
            scripts/transition_cancel_cascade_test.py
            scripts/job_complete_no_tentative_done_test.py
            scripts/truth_gate_pdf_test.py
            scripts/stale_invalidation_test.py
            scripts/orchestrate_plan_test.py
            scripts/dispatch_orchestration_test.py
            scripts/dispatch_monitor_policy_test.py
            scripts/council_plan_test.py
            scripts/dashboard_ui_interaction_test.py
            scripts/dashboard_log_readability_test.py
            scripts/agent_log_dashboard_test.py
            scripts/dashboard_cost_panel_test.py
            scripts/dashboard_subscription_cost_display_test.py
            scripts/imagegen_job_test.py
            scripts/imagegen_keychain_retry_test.py
            scripts/doctor_test.py
            scripts/schema_validate_test.py
            scripts/job_profile_test.py
            scripts/lessons_apply_test.py
            scripts/plan_check_content_quality_test.py
            scripts/smoke_test.py
            scripts/sample_scenario_test.py
          )
          for t in "${tests[@]}"; do
            if [[ -f "$t" ]]; then
              echo "running: $t"
              python "$t"
            else
              echo "skip (not present on this branch): $t"
            fi
          done
